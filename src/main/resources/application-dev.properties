# ============================================================
#  PERFIL: DESENVOLVIMENTO (dev)
# ------------------------------------------------------------
#  NAO ative este arquivo aqui dentro. O ambiente e escolhido
#  em application.properties (spring.profiles.active=dev).
#  Este arquivo so e lido quando o perfil 'dev' esta ativo.
# ============================================================
# Valores diretos para rodar localmente sem configurar nada.
# Ajuste o banco/senha abaixo conforme sua maquina, se necessario.

# --- Banco de dados (local) ---
spring.datasource.url=jdbc:mariadb://localhost:3306/songsystem
spring.datasource.username=root
spring.datasource.password=teste123

# --- JPA / Hibernate ---
# 'update' ajusta o schema automaticamente durante o desenvolvimento.
spring.jpa.hibernate.ddl-auto=update
# SQL visivel no console para depuracao.
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Thymeleaf ---
# Cache desligado: alteracoes nos templates aparecem sem reiniciar.
spring.thymeleaf.cache=false

# --- Upload ---
app.upload.dir=./uploads/songsystem/

# --- Sessao ---
# Cookie sem 'secure' (permite rodar em http://localhost).
server.servlet.session.cookie.secure=false

# --- Erros ---
# Mostra stack trace e mensagens para facilitar a depuracao.
server.error.include-stacktrace=always
server.error.include-message=always
