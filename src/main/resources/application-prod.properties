# ============================================================
#  PERFIL: PRODUCAO (prod)
# ------------------------------------------------------------
#  NAO ative este arquivo aqui dentro. O ambiente e escolhido
#  em application.properties (spring.profiles.active=prod).
#  Este arquivo so e lido quando o perfil 'prod' esta ativo.
# ============================================================
# Nenhuma credencial fica no arquivo. Tudo vem de variaveis de ambiente.
# Defina no servidor antes de iniciar a aplicacao:
#   DB_URL, DB_USERNAME, DB_PASSWORD, APP_UPLOAD_DIR

# --- Banco de dados (variaveis de ambiente, sem defaults sensiveis) ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# --- JPA / Hibernate ---
# 'validate' apenas confere se o schema bate com as entidades, sem alterar
# o banco em producao. Versione mudancas de schema com Flyway/Liquibase.
spring.jpa.hibernate.ddl-auto=validate
# SQL nunca exposto em log de producao.
spring.jpa.properties.hibernate.show_sql=false
spring.jpa.properties.hibernate.format_sql=false

# --- Thymeleaf ---
# Cache ligado para desempenho.
spring.thymeleaf.cache=true

# --- Upload ---
# Caminho absoluto definido no servidor (ex.: /var/app/uploads/).
app.upload.dir=${APP_UPLOAD_DIR:/var/songsystem/uploads/}

# --- Sessao ---
# Cookie 'secure': enviado apenas por HTTPS.
server.servlet.session.cookie.secure=true

# --- Erros ---
# Nunca expor stack trace nem mensagens internas ao usuario final.
server.error.include-stacktrace=never
server.error.include-message=never
