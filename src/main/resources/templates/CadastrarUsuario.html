<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Song System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        /* Seu CSS existente... */
        body {
            background: #212529;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow: hidden;
        }

        .background-icons {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-icon {
            position: absolute;
            color: rgba(255, 255, 255, 0.03);
            font-size: 4rem;
            animation: float 20s infinite linear;
        }

        .bg-icon:nth-child(1) { top: 10%; left: 5%; font-size: 6rem; animation-duration: 25s; }
        .bg-icon:nth-child(2) { top: 20%; right: 8%; font-size: 5rem; animation-duration: 30s; animation-delay: -5s; }
        .bg-icon:nth-child(3) { bottom: 15%; left: 10%; font-size: 7rem; animation-duration: 35s; animation-delay: -10s; }
        .bg-icon:nth-child(4) { bottom: 25%; right: 15%; font-size: 4rem; animation-duration: 28s; }
        .bg-icon:nth-child(5) { top: 40%; left: 20%; font-size: 3rem; animation-duration: 22s; }
        .bg-icon:nth-child(6) { bottom: 40%; right: 25%; font-size: 5rem; animation-duration: 32s; animation-delay: -8s; }
        .bg-icon:nth-child(7) { top: 60%; left: 30%; font-size: 4rem; animation-duration: 26s; }
        .bg-icon:nth-child(8) { bottom: 50%; right: 35%; font-size: 6rem; animation-duration: 38s; }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            50% { transform: translateY(-50px) rotate(180deg); opacity: 0.5; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        .cadastro-card {
            background: #2b3035;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            overflow: hidden;
            max-width: 500px;
            width: 100%;
            margin: 20px;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .cadastro-header {
            background: #212529;
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .cadastro-header i {
            font-size: 3.5rem;
            margin-bottom: 10px;
            color: #0d6efd;
        }

        .cadastro-header h3 {
            margin: 0;
            font-weight: 600;
            color: white;
        }

        .cadastro-header p {
            margin: 5px 0 0;
            opacity: 0.7;
            color: #adb5bd;
        }

        .cadastro-body {
            padding: 40px;
        }

        .form-floating {
            margin-bottom: 20px;
        }

        .form-floating label {
            color: #adb5bd;
        }

        .form-control {
            background: #212529;
            border: 1px solid #495057;
            color: white;
        }

        .form-control:focus {
            background: #212529;
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
            color: white;
        }

        .form-control:focus + label {
            color: #0d6efd;
        }

        .btn-cadastro {
            background-color: #0d6efd;
            border: none;
            padding: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            width: 100%;
            margin-top: 10px;
            color: white;
        }

        .btn-cadastro:hover {
            background-color: #0b5ed7;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(13, 110, 253, 0.3);
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
        }

        .login-link p {
            color: #adb5bd !important;
        }

        .login-link a {
            color: #0d6efd;
        }

        .login-link a:hover {
            color: #0b5ed7;
        }

        .alert {
            border-radius: 15px;
        }

        .vinyl-container {
            position: absolute;
            bottom: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            opacity: 0.05;
            animation: spin 20s infinite linear;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .form-floating label i {
            width: 20px;
            text-align: center;
        }

        .requirements {
            font-size: 0.75rem;
            color: #6c757d;
            margin-top: -15px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
<!-- Ícones flutuantes de fundo -->
<div class="background-icons">
    <div class="bg-icon"><i class="bi bi-music-note"></i></div>
    <div class="bg-icon"><i class="bi bi-disc-fill"></i></div>
    <div class="bg-icon"><i class="bi bi-guitar"></i></div>
    <div class="bg-icon"><i class="bi bi-vinyl-fill"></i></div>
    <div class="bg-icon"><i class="bi bi-music-note-beamed"></i></div>
    <div class="bg-icon"><i class="bi bi-headphones"></i></div>
    <div class="bg-icon"><i class="bi bi-piano"></i></div>
    <div class="bg-icon"><i class="bi bi-mic"></i></div>
</div>

<div class="cadastro-card">
    <div class="cadastro-header">
        <i class="bi bi-person-plus-fill"></i>
        <h3>Criar Conta</h3>
        <p>Comece sua jornada musical</p>
    </div>
    <div class="cadastro-body">
        <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${erro}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${mensagem}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${mensagem}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <form th:action="@{/cadastro/salvar}" method="post" th:object="${usuarioDTO}">
            <div class="form-floating">
                <input type="text" class="form-control" id="nome" th:field="*{nome}" placeholder="Nome completo" required>
                <label for="nome">
                    <i class="bi bi-person-badge me-2"></i>Nome Completo
                </label>
            </div>

            <div class="form-floating">
                <input type="text" class="form-control" id="username" th:field="*{username}" placeholder="Usuário" required>
                <label for="username">
                    <i class="bi bi-person me-2"></i>Usuário
                </label>
            </div>

            <div class="form-floating">
                <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="Email" required>
                <label for="email">
                    <i class="bi bi-envelope me-2"></i>Email
                </label>
            </div>

            <div class="form-floating">
                <input type="password" class="form-control" id="senha" th:field="*{senha}" placeholder="Senha" required>
                <label for="senha">
                    <i class="bi bi-lock me-2"></i>Senha
                </label>
            </div>
            <div class="requirements">
                <i class="bi bi-info-circle me-1"></i>Mínimo de 6 caracteres
            </div>

            <div class="form-floating">
                <input type="password" class="form-control" id="confirmarSenha" name="confirmarSenha" placeholder="Confirmar senha" required>
                <label for="confirmarSenha">
                    <i class="bi bi-shield-lock me-2"></i>Confirmar Senha
                </label>
            </div>

            <button type="submit" class="btn btn-cadastro">
                <i class="bi bi-check-circle me-2"></i>Cadastrar
            </button>
        </form>

        <div class="login-link">
            <p class="mb-0">
                Já tem uma conta?
                <a th:href="@{/login}" class="text-decoration-none">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Faça login
                </a>
            </p>
        </div>
    </div>
</div>

<div class="vinyl-container">
    <i class="bi bi-vinyl-fill" style="font-size: 200px;"></i>
</div>

<script>
    document.querySelector('form').addEventListener('submit', function(e) {
        const senha = document.getElementById('senha').value;
        const confirmarSenha = document.getElementById('confirmarSenha').value;

        if (senha !== confirmarSenha) {
            e.preventDefault();
            alert('As senhas não coincidem!');
            return false;
        }

        if (senha.length < 8) {
            e.preventDefault();
            alert('A senha deve ter no mínimo 8 caracteres!');
            return false;
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
