<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Song System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: #212529;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* Ícones flutuantes no fundo */
        .background-icons {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-icon {
            position: absolute;
            color: rgba(255, 255, 255, 0.03);
            font-size: 4rem;
            animation: float 20s infinite linear;
        }

        .bg-icon:nth-child(1) { top: 10%; left: 5%; font-size: 6rem; animation-duration: 25s; }
        .bg-icon:nth-child(2) { top: 20%; right: 8%; font-size: 5rem; animation-duration: 30s; animation-delay: -5s; }
        .bg-icon:nth-child(3) { bottom: 15%; left: 10%; font-size: 7rem; animation-duration: 35s; animation-delay: -10s; }
        .bg-icon:nth-child(4) { bottom: 25%; right: 15%; font-size: 4rem; animation-duration: 28s; }
        .bg-icon:nth-child(5) { top: 40%; left: 20%; font-size: 3rem; animation-duration: 22s; }
        .bg-icon:nth-child(6) { bottom: 40%; right: 25%; font-size: 5rem; animation-duration: 32s; animation-delay: -8s; }
        .bg-icon:nth-child(7) { top: 60%; left: 30%; font-size: 4rem; animation-duration: 26s; }
        .bg-icon:nth-child(8) { bottom: 50%; right: 35%; font-size: 6rem; animation-duration: 38s; }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            50% { transform: translateY(-50px) rotate(180deg); opacity: 0.5; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        .login-card {
            background: #2b3035;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
            margin: 20px;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .login-header {
            background: #212529;
            padding: 40px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .login-header i {
            font-size: 4rem;
            margin-bottom: 15px;
            color: #0d6efd;
        }

        .login-header h3 {
            margin: 0;
            font-weight: 600;
            color: white;
        }

        .login-header p {
            margin: 10px 0 0;
            opacity: 0.7;
            color: #adb5bd;
        }

        .login-body {
            padding: 40px;
        }

        .form-floating {
            margin-bottom: 20px;
        }

        .form-floating label {
            color: #adb5bd;
        }

        .form-control {
            background: #212529;
            border: 1px solid #495057;
            color: white;
        }

        .form-control:focus {
            background: #212529;
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
            color: white;
        }

        .form-control:focus + label {
            color: #0d6efd;
        }

        /* Botão entrar - azul sólido do Bootstrap */
        .btn-login {
            background-color: #0d6efd;
            border: none;
            padding: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            width: 100%;
            margin-top: 10px;
            color: white;
        }

        .btn-login:hover {
            background-color: #0b5ed7;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(13, 110, 253, 0.3);
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
        }

        .register-link p {
            color: #adb5bd !important;
        }

        .register-link a {
            color: #0d6efd;
        }

        .register-link a:hover {
            color: #0b5ed7;
        }

        .alert {
            border-radius: 15px;
        }

        /* Vinil girando */
        .vinyl-container {
            position: absolute;
            bottom: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            opacity: 0.05;
            animation: spin 20s infinite linear;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Ícones nos inputs */
        .form-floating label i {
            width: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
<!-- Ícones flutuantes de fundo -->
<div class="background-icons">
    <div class="bg-icon"><i class="bi bi-music-note"></i></div>
    <div class="bg-icon"><i class="bi bi-disc-fill"></i></div>
    <div class="bg-icon"><i class="bi bi-guitar"></i></div>
    <div class="bg-icon"><i class="bi bi-vinyl-fill"></i></div>
    <div class="bg-icon"><i class="bi bi-music-note-beamed"></i></div>
    <div class="bg-icon"><i class="bi bi-headphones"></i></div>
    <div class="bg-icon"><i class="bi bi-piano"></i></div>
    <div class="bg-icon"><i class="bi bi-mic"></i></div>
</div>

<div class="login-card">
    <div class="login-header">
        <i class="bi bi-music-note-beamed"></i>
        <h3>Song System</h3>
        <p>Gerencie seu repertório musical</p>
    </div>
    <div class="login-body">
        <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${erro}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            Você saiu do sistema com sucesso!
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${mensagem}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${mensagem}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <form th:action="@{/login/autenticar}" method="post" th:object="${usuarioDTO}" id="loginForm">
            <div class="form-floating">
                <input type="text" class="form-control" id="username" th:field="*{username}" placeholder="E-mail ou usuário" required>
                <label for="username">
                    <i class="bi bi-person me-2"></i>E-mail ou usuário
                </label>
            </div>
            <div class="form-floating">
                <input type="password" class="form-control" id="password" th:field="*{senha}" placeholder="Senha">
                <label for="password">
                    <i class="bi bi-lock me-2"></i>Senha
                </label>
                <div class="form-text text-secondary ps-1" id="adminHint" style="display:none; font-size:.8rem;">
                    <i class="bi bi-info-circle me-1"></i>Primeiro acesso do admin — deixe a senha em branco e clique em Entrar.
                </div>
            </div>
            <button type="submit" class="btn btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
            </button>
        </form>

        <div class="register-link">
            <p class="mb-1">
                Não tem uma conta?
                <a th:href="@{/cadastro}" class="text-decoration-none">
                    <i class="bi bi-person-plus me-1"></i>Cadastre-se
                </a>
            </p>
            <p class="mb-0">
                <a th:href="@{/recuperar-senha}" class="text-decoration-none text-secondary" style="font-size:.9rem;">
                    <i class="bi bi-key me-1"></i>Esqueci minha senha
                </a>
            </p>
        </div>
    </div>
</div>

<div class="vinyl-container">
    <i class="bi bi-vinyl-fill" style="font-size: 200px;"></i>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    const adminHint  = document.getElementById('adminHint');

    usernameEl.addEventListener('input', function () {
        const val = this.value.trim().toLowerCase();
        const isAdmin = (val === 'admin');
        adminHint.style.display = isAdmin ? 'block' : 'none';
        // Só exige senha se não for o primeiro acesso do admin
        passwordEl.required = !isAdmin;
    });

    document.getElementById('loginForm').addEventListener('submit', function (e) {
        const val = usernameEl.value.trim().toLowerCase();
        const senha = passwordEl.value;
        // Para qualquer usuário que não seja 'admin', senha é obrigatória
        if (val !== 'admin' && !senha) {
            e.preventDefault();
            passwordEl.focus();
            passwordEl.classList.add('is-invalid');
        }
    });

    passwordEl.addEventListener('input', function () {
        this.classList.remove('is-invalid');
    });
</script>
</body>
</html>
