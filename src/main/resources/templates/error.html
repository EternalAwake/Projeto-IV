<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ops! Algo deu errado - Song System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" xintegrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .error-card {
            background: white;
            border-radius: 1.5rem;
            padding: 3rem;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .error-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #f5576c, #f093fb);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            color: white;
        }
        .error-code {
            font-size: 0.85rem;
            color: #adb5bd;
            font-weight: 600;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon">
            <i class="bi bi-emoji-dizzy"></i>
        </div>
        <h3 class="fw-bold mb-2">Ops! Algo deu errado</h3>
        <p class="text-muted mb-1">
            Não conseguimos carregar a página que você tentou acessar.
            O link pode estar quebrado ou a página pode ter sido movida.
        </p>
        <p class="error-code mb-4">
            <span th:if="${status}" th:text="'Erro ' + ${status}">Erro 500</span>
        </p>
        <div class="d-flex gap-2 justify-content-center">
            <a th:href="@{/inicio}" class="btn btn-primary rounded-3 px-4">
                <i class="bi bi-house-door me-2"></i>Voltar ao Início
            </a>
            <a href="javascript:history.back()" class="btn btn-outline-secondary rounded-3 px-4">
                <i class="bi bi-arrow-left me-2"></i>Página Anterior
            </a>
        </div>
    </div>
</body>
</html>
