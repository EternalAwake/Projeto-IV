<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Senha - Song System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background:#212529; min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
        .card-box { background:#2b3035; border-radius:30px; box-shadow:0 20px 40px rgba(0,0,0,.5); max-width:450px; width:100%; margin:20px; border:1px solid rgba(255,255,255,.1); overflow:hidden; }
        .card-header-custom { background:#212529; padding:40px; text-align:center; border-bottom:1px solid rgba(255,255,255,.1); }
        .card-header-custom i { font-size:3.5rem; color:#0d6efd; margin-bottom:15px; }
        .card-header-custom h3 { color:white; font-weight:600; margin:0; }
        .card-header-custom p { color:#adb5bd; margin:10px 0 0; }
        .card-body-custom { padding:40px; }
        .form-control { background:#212529; border:1px solid #495057; color:white; }
        .form-control:focus { background:#212529; border-color:#0d6efd; box-shadow:0 0 0 .2rem rgba(13,110,253,.25); color:white; }
        label { color:#adb5bd; }
    </style>
</head>
<body>
<div class="card-box">
    <div class="card-header-custom">
        <i class="bi bi-key-fill"></i>
        <h3>Recuperar Senha</h3>
        <p>Informe seu e-mail ou nome de usuário</p>
    </div>
    <div class="card-body-custom">

        <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show rounded-3" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${erro}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <form th:action="@{/recuperar-senha/pergunta}" method="post">
            <div class="mb-4">
                <label for="usernameOuEmail" class="form-label">E-mail ou usuário</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="usernameOuEmail" name="usernameOuEmail"
                           placeholder="seu@email.com ou usuario" required autofocus>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                <i class="bi bi-arrow-right-circle me-2"></i>Continuar
            </button>
        </form>

        <hr class="border-secondary my-4">
        <div class="text-center">
            <a th:href="@{/login}" class="text-decoration-none text-secondary">
                <i class="bi bi-arrow-left me-1"></i>Voltar ao login
            </a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
