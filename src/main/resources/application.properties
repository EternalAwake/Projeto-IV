spring.application.name=songsystem

# =========================================================================
#  UNICA LINHA QUE VOCE PRECISA TROCAR PARA ALTERNAR O AMBIENTE
# =========================================================================
#   dev  = desenvolvimento  -> banco local, SQL no console, sem cache,
#                              erros detalhados, cookie sem HTTPS
#   prod = producao         -> credenciais por variavel de ambiente,
#                              cache ligado, SQL oculto, cookie seguro
#
#  Cada ambiente le seu proprio arquivo automaticamente:
#     dev  -> application-dev.properties
#     prod -> application-prod.properties
#
#  Sem editar o arquivo, da pra sobrescrever na execucao por:
#     variavel de ambiente:  SPRING_PROFILES_ACTIVE=prod
#     argumento ao iniciar:  --spring.profiles.active=prod
# =========================================================================
spring.profiles.active=dev

# =========================================================================
#  CONFIGURACOES COMUNS A TODOS OS AMBIENTES
# =========================================================================
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Upload de arquivos (limites alinhados com ImageUploadUtil = 5 MB por imagem)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true
spring.web.resources.static-locations=classpath:/static/,file:${app.upload.dir}

# Sessao
server.servlet.session.cookie.http-only=true
server.servlet.session.timeout=30m

# Pool de conexoes (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
